experiment: &experiment
  project_name: optimize_classification
  annotation_file: /path/to/annotations.csv
  project_root: /path/to/results
  task: classification
  mode: optimization
  label_column: category
  mixed_precision: true
mil: &mil
  epochs: 20
  batch_size: 1
  optimizer: Adam
  lr: 0.0001
  weight_decay: 0.00001
  bag_size: 512
  z_dim: 256
  dropout_p: 0.1
slide_processing: &slides
  backend: lazyslide
  segmentation_method: otsu
  feature_extraction: {batch_size: 32, num_workers: 4, amp: true}
datasets: &datasets
  - {name: train, slides_dir: /path/to/train/slides, artifacts_dir: /path/to/train/artifacts, used_for: training}
  - {name: validation, slides_dir: /path/to/validation/slides, artifacts_dir: /path/to/validation/artifacts, used_for: validation}
benchmark_parameters: &pipeline
  tile_px: [224]
  tile_mpp: [0.5, 1.0]
  color_norm: [null, macenko]
  feature_extraction: [h-optimus-1, uni2, virchow2, gpfm]
  mil: [ABMIL, DSMIL, TransMIL]
  loss: [CrossEntropyLoss, NLLLoss]
optimization:
  study_name: classification_pipeline
  objective_metric: balanced_accuracy
  objective_mode: max
  sampler: TPESampler
  pruner: HyperbandPruner
  trials: 100
  search_space: &search
    lr: {kind: float, low: 0.00001, high: 0.001, log: true}
    weight_decay: {kind: float, low: 0.000001, high: 0.001, log: true}
    epochs: {kind: int, low: 10, high: 50, step: 5}
    bag_size: {kind: categorical, choices: [256, 512, 1024]}
    z_dim: {kind: categorical, choices: [128, 256, 512]}
    dropout_p: {kind: float, low: 0.0, high: 0.5, step: 0.1}
    optimizer: {kind: categorical, choices: [Adam, AdamW]}
    scheduler: {kind: categorical, choices: [none, cosine, reduce_on_plateau]}
