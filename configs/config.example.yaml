experiment:
  project_name: "PathForge_Study_v2"
  annotation_file: "/data/annotations/dataset.csv"
  project_root: null

  # Execution details
  num_workers: 4

  # Mode
  # NOTE: feature_extraction mode avoids requiring benchmark_parameters.mil to be valid/registered.
  mode: "feature_extraction"
  task: "classification"          # optional in feature_extraction mode, kept for clarity
  aggregation_level: "slide"

  # Flags
  report: true
  thumbnail: false
  mixed_precision: true

classification:
  split_technique: "k-fold"
  val_fraction: 0.2
  balancing: "weighted"
  class_weighting: true
  epochs: 20
  best_epoch_based_on: "val_loss"
  batch_size: 1
  bag_size: 1000
  encoder_layers: 2
  z_dim: 256
  dropout_p: 0.25
  k: 10
  skip_extracted: false
  skip_feature_extraction: false

slide_processing:
  backend: "lazyslide"
  save_tiles: false
  segmentation_method: "otsu"
  qc_filters: []   # passed as kwargs to lazyslide find_tissues; keep empty unless you know supported params
  feature_extraction:
    batch_size: 32
    num_workers: 4
    amp: true

optimization:
  study_name: "HyperParam_Optimization"
  load_study: false
  objective_metric: "balanced_accuracy"
  objective_mode: "max"
  objective_dataset: "val"
  sampler: "TPESampler"
  trials: 50
  pruner: "MedianPruner"
  # Set a shared PostgreSQL URL when multiple optimization workers participate.
  storage: null
  trials_per_worker: 5
  heartbeat_interval: null
  stale_trial_timeout: null

execution:
  backend: "local"             # local, slurm, or dask
  work_dir: "./pathforge-work"
  resume: true
  max_workers: 4
  resources:
    feature_extraction: {cpus: 4, gpus: 1, memory_gb: 32, time: "12:00:00"}
    benchmarking: {cpus: 4, gpus: 1, memory_gb: 32, time: "12:00:00"}
    optimization: {cpus: 4, gpus: 1, memory_gb: 32, time: "12:00:00"}
    aggregation: {cpus: 1, gpus: 0, memory_gb: 8, time: "01:00:00"}
  slurm:
    partition: null
    account: null
    qos: null
    constraint: null
    max_concurrent: 16
    extra_directives: []

evaluation:
  label_column: "category"
  metrics: ["balanced_accuracy", "auc", "f1"]
  visualization: ["retrieval_results", "retrieval_representation"]
  visualization_metadata_columns: ["dataset", "patient", "category"]
  visualization_subset_file: "/data/annotations/visualization_subset.csv"
  visualization_top_k: 10

datasets:
  - name: "TCGA-BRCA"
    slides_dir: "/data/wsi/brca"
    artifacts_dir: "/data/artifacts/brca_h5"
    tissue_annotations_dir: null
    used_for: "training"

  - name: "TCGA-LUNG"
    slides_dir: "/data/wsi/lung"
    artifacts_dir: "/data/artifacts/lung_h5"
    tissue_annotations_dir: null
    used_for: "testing"

benchmark_parameters:
  # These are used for both feature extraction combos and benchmark combos.
  tile_px: [256, 512]
  tile_mpp: [0.5]

  # Pick models that are available in your environment (timm/lazyslide).
  # If you rely on your own registry population, ensure those modules are imported before config validation.
  feature_extraction: ["resnet18"]

  # In feature_extraction mode, mil can be empty.
  # If you switch to mode: "benchmark", you MUST set mil to valid registered model names.
  mil: []

  loss: ["CrossEntropyLoss"]
  activation_function: ["ReLU"]
  optimizer: ["Adam", "AdamW"]
