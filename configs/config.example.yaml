experiment:
  project_name: "PathBench_Study_v2"
  annotation_file: "/data/annotations/dataset.csv"
  # Execution details
  num_workers: 4
  split_technique: "k-fold"
  val_fraction: 0.2
  # Task definition
  task: "classification"
  mode: "benchmark"
  aggregation_level: "slide"
  # Flags
  report: true
  mixed_precision: true
  # Evaluation
  visualization: ["confusion_matrix", "roc_curve", "attention_map"]
  evaluation: ["balanced_accuracy", "auc", "f1"]
  custom_metrics: []

mil:
  balancing: "weighted"
  class_weighting: true
  epochs: 20
  best_epoch_based_on: "val_loss"
  batch_size: 1  # Bag size usually 1 for slide-level MIL
  bag_size: 1000 # Max instances per bag if using sampling
  encoder_layers: 2
  z_dim: 256
  dropout_p: 0.25
  k: 10
  skip_extracted: false
  skip_feature_extraction: false

slide_processing:
  backend: "lazyslide"
  save_tiles: false
  qc: ["Otsu"]
  qc_filters:
    - {name: "grayspace", threshold: 0.1}

optimization:
  study_name: "HyperParam_Optimization"
  load_study: false
  objective_metric: "balanced_accuracy"
  objective_mode: "max"
  objective_dataset: "val"
  sampler: "TPESampler"
  trials: 50
  pruner: "MedianPruner"

datasets:
  - name: "TCGA-BRCA"
    slide_path: "/data/wsi/brca"
    tfrecord_path: ""
    tile_path: "/data/features/brca_resnet50.pt"
    used_for: "training"
  
  - name: "TCGA-LUNG"
    slide_path: "/data/wsi/lung"
    tfrecord_path: ""
    tile_path: "/data/features/lung_resnet50.pt"
    used_for: "testing"

benchmark_parameters:
  # Grid search parameters for BenchmarkingPolicy
  tile_px: [256, 512]
  tile_um: ["20x"]
  feature_extraction: ["resnet50", "ctranspath"]
  mil: ["AttentionMIL", "TransMIL", "DSMIL"]
  loss: ["CrossEntropyLoss"]
  activation_function: ["ReLU"]
  optimizer: ["Adam", "AdamW"]

weights_dir: "./artifacts/weights"
hf_key: null