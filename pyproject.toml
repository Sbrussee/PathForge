# pyproject.toml
[project]
name = "pathbench"
version = "0.1.0"
description = "PathBench 2.0"
authors = [{name = "Siemen Brussee"}]
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "numpy",
    "scikit-learn",
    "torch",
    "pytorch-lightning", # Training
    "optuna",            # Optimization
    "pyYAML",
    "lazyslide",
    "pydantic>=2.5,<3.0",
]


[project.optional-dependencies]
# Opt-in heavy deps
survival = ["scikit-survival"]
gnn = ["torch-geometric>=2.5"]
hf = ["huggingface_hub>=0.25"]
docs = ["mkdocs-material>=9.5"]


[project.scripts]
pathbench-benchmark = "pathbench.cli.benchmark:main"
pathbench-optimize = "pathbench.cli.optimize:main"
pathbench-features = "pathbench.cli.feature_extract:main"
pathbench-infer = "pathbench.cli.inference:main"


#[tool.uv]
#resolver = "lowest-compatible"